services:
  postgres:
    image: postgres:16-alpine
    container_name: artha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artha
      POSTGRES_PASSWORD: artha_dev_password
      POSTGRES_DB: artha_relational
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data-pipeline/db/init-postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artha -d artha_relational"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: artha_timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: artha
      POSTGRES_PASSWORD: artha_dev_password
      POSTGRES_DB: artha_timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../data-pipeline/db/init-timescale.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=timescaledb,pg_stat_statements
      -c timescaledb.telemetry_level=off
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artha -d artha_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5

  artha-api:
    build: ./services/artha-api
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PG_DATABASE_URL: ${PG_DATABASE_URL:-postgresql://artha:artha_dev_password@postgres:5432/artha_relational}
      TS_DATABASE_URL: ${TS_DATABASE_URL:-postgresql://artha:artha_dev_password@timescaledb:5432/artha_timeseries}
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      ALLOWED_ORIGINS: http://localhost:3000
      ENVIRONMENT: development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  nextjs:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      artha-api:
        condition: service_started
    command: sh -c "mkdir -p /app/.next && npm install && npm run dev -- --webpack --hostname 0.0.0.0 --port 3000"
    volumes:
      - .:/app
      - next_cache:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://artha-api:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      nextjs:
        condition: service_started
      artha-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  timescale_data:
    driver: local
  next_cache:
    driver: local
