services:
  artha-api:
    working_dir: /app
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app
      - --log-level
      - info
    volumes:
      - ./services/artha-api:/app
    ports:
      - "8000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
